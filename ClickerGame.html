<!DOCTYPE html>
<html>
<head>
    <title> Timer Click Game </title>

    <style>
        body {
            background-color: #5fb4ff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            
        }

        h1{
            color: #333
        }

        button {
            background-color: #4CAF50;
            color: white;
            font-size: 20px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }

        button:hover{
            background-color: #45a049;
        }

        #restartBtn {
            background-color: #ff7353;
        }
        
        #restartBtn:hover {
            background-color: #fb8c00;
        }

        #timer {
            color: red;
            font-size: 24px;
        }

        #message {
            font-size: 24px;
            margin-top: 20px
        }

    </style>
</head>
<body>

    <h1> Beat the Timer! </h1>
    <p> Time Left: <span id="timer">10</span> seconds</p>
    <p>Clicks: <span id="score">0</span></p>

    <button id="clickBtn" onclick="addPoint()">Click Me!</button>
    <br>
    <button id="restartBtn" onclick="restartGame()">Restart</button>
    <p id="message"></p>

    <script>
        let score = 0;
        let timeLeft = 10;
        let timer = null;
        let gameActive = true;

        startTimer();

        function startTimer() {
            gameActive =true;
            timer = setInterval(function(){
                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;

                if (timeLeft === 0) {
                    endGame ("❌ Time's Up! You lost!");
                }
            }, 1000);
        }

        function addPoint() {
            if (!gameActive) return;

            score++;
            document.getElementById("score").innerText = score;

            if (score === 60){
                endGame ("🎉 You win! 🎉")
            }
        }

        function endGame(message) {
            gameActive = false;
            clearInterval(timer);
            document.getElementById("message").innerText = message
        }

        function restartGame () {
            clearInterval(timer);
            score = 0
            timeLeft = 10;
            document.getElementById("score").innerText = score;
            document.getElementById("timer").innerText = timeLeft;
            document.getElementById("message").innerText = "";
            startTimer();
        }
    </script>
</body>
</html>
